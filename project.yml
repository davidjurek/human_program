name: HumanProgram
options:
  bundleIdPrefix: app.humanprogram
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true

settings:
  SWIFT_VERSION: "5.9"
  IPHONEOS_DEPLOYMENT_TARGET: "17.0"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
  PRODUCT_BUNDLE_IDENTIFIER: app.humanprogram.ios

targets:
  HumanProgram:
    type: application
    platform: iOS
    sources:
      - path: HumanProgram
    resources:
      - path: HumanProgram/Resources
    info:
      path: HumanProgram/Resources/Info.plist
      properties:
        CFBundleDisplayName: Human Program
        CFBundleName: HumanProgram
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchStoryboardName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCalendarsUsageDescription: "Human Program uses your calendars to show events in Today."
        NSFaceIDUsageDescription: "Human Program uses Face ID to protect your planner."
        UIBackgroundModes: []
    settings:
      INFOPLIST_FILE: HumanProgram/Resources/Info.plist
      PRODUCT_NAME: HumanProgram

  HumanProgramTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HumanProgramTests
    dependencies:
      - target: HumanProgram
    settings:
      TEST_HOST: ""
      BUNDLE_LOADER: ""
      GENERATE_INFOPLIST_FILE: YES

schemes:
  HumanProgram:
    build:
      targets:
        HumanProgram: all
        HumanProgramTests: [test]
    test:
      targets:
        - HumanProgramTests
